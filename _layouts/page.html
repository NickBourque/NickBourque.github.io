---
layout: default
---
<div class="page-container">
  <header class="page-header">
    <div class="container">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
      <div class="header-divider"></div>
    </div>
  </header>

  <section class="page-content-section">
    <div class="container">
      {{ content }}
    </div>
  </section>
</div>
